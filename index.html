<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jVox Card Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0c10;
            color: #e2e8f0;
        }

        /* 3D Gold Embossed Style Matrix matching your exact mock-up */
        .gold-embossed {
            color: #ebd197;
            background: linear-gradient(180deg, #ffffff 0%, #d8ae64 60%, #916b28 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.6));
        }

        .pill-gold-gradient {
            background: linear-gradient(135deg, #fce095 0%, #cfa153 40%, #b28437 70%, #684a16 100%);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.3), 0 4px 10px rgba(0,0,0,0.4);
        }

        /* Cross-Browser Vertical Alignment Rules for Sidebar */
        .vertical-text {
            writing-mode: vertical-lr;
            transform: rotate(180deg);
        }
    </style>
</head>
