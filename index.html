<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jVox Card Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0c10;
            color: #e2e8f0;
        }

        /* 3D Gold Embossed Style Adjustments */
        .gold-embossed {
            color: #ebd197;
            background: linear-gradient(180deg, #ffffff 0%, #d8ae64 60%, #916b28 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.6));
        }

        .pill-gold-gradient {
            background: linear-gradient(135deg, #fce095 0%, #cfa153 40%, #b28437 70%, #684a16 100%);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.3), 0 4px 10px rgba(0,0,0,0.4);
        }

        /* Writing mode explicitly handled for vertical text cross-browser compatibility */
        .vertical-text {
            writing-mode: vertical-lr;
            transform: rotate(180deg);
        }
    </style>
</head>
<body class="min-h-screen p-4 sm:p-8 flex flex-col items-center justify-center">

    <div class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-8 items-center">
        
        <div class="lg:col-span-4 bg-[#14171f] border border-[#242936] rounded-2xl p-6 shadow-2xl space-y-5 z-20">
            <div>
                <h1 class="text-xl font-bold text-white tracking-wide">jVox Token Updater</h1>
                <p class="text-xs text-gray-400 mt-1">Input variables to clear the placeholders and export your card asset.</p>
            </div>
            
            <hr class="border-[#242936]">

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Tester Groq API Key</label>
                    <input type="text" id="inputKey" placeholder="gsk_..." class="w-full bg-[#0d0f12] border border-[#242936] rounded-lg px-3 py-2 text-xs font-mono text-white focus:outline-none focus:border-[#cfa153]">
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Expiration Date</label>
                    <input type="date" id="inputExpires" class="w-full bg-[#0d0f12] border border-[#242936] rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-[#cfa153]">
                </div>
            </div>

            <button id="btnDownload" class="w-full bg-gradient-to-r from-[#fce095] to-[#cfa153] text-[#0d0f12] font-bold text-sm py-3 rounded-lg hover:opacity-90 active:scale-[0.99] transition flex items-center justify-center gap-2 shadow-lg cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
                </svg>
                Export Final PNG
            </button>
        </div>

        <div class="lg:col-span-8 flex flex-col items-center justify-center w-full">
            
            <div id="captureFrame" class="w-full max-w-[580px] aspect-[1.45/1] p-8 flex items-center justify-center relative rounded-3xl bg-[#e9e7f2] overflow-hidden shadow-2xl">
                
                <div class="absolute inset-0 opacity-50 pointer-events-none transform -rotate-6 scale-110 translate-y-2 grid grid-cols-2 gap-4 p-4 z-0">
                    <div class="bg-white rounded-xl shadow-md p-4 space-y-3 border border-gray-200">
                        <div class="h-3 w-16 bg-purple-200 rounded"></div>
                        <div class="h-7 w-full bg-gray-100 rounded"></div>
                        <div class="grid grid-cols-2 gap-2"><div class="h-12 bg-teal-50 rounded-lg"></div><div class="h-12 bg-amber-50 rounded-lg"></div></div>
                    </div>
                    <div class="bg-white rounded-xl shadow-md p-4 space-y-3 border border-gray-200">
                        <div class="h-3 w-20 bg-gray-200 rounded"></div>
                        <div class="h-14 w-full bg-purple-50/50 rounded-lg border border-dashed border-purple-200"></div>
                        <div class="h-5 w-1/2 bg-gray-100 rounded"></div>
                    </div>
                </div>

                <div class="w-full aspect-[1.586/1] rounded-[22px] p-7 relative flex flex-col justify-between bg-[#12141a] border border-[#262b38] shadow-[0_30px_70px_rgba(0,0,0,0.8)] z-10 overflow-hidden">
                    
                    <div class="absolute inset-2.5 rounded-[14px] border border-[#cfa153]/25 pointer-events-none"></div>

                    <div class="absolute inset-0 opacity-[0.22] pointer-events-none z-0">
                        <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                            <path d="M10 20 L40 20 L55 35 L55 75 M0 50 L30 50 L45 65 L90 65 M75 0 L75 30 L90 45" stroke="#cfa153" stroke-width="1.2" fill="none"/>
                            <circle cx="55" cy="75" r="2" fill="#cfa153"/>
                            <circle cx="90" cy="65" r="2" fill="#cfa153"/>
                        </svg>
                    </div>

                    <div class="flex justify-between items-start z-10 relative">
                        <div class="w-full flex items-center justify-between">
                            <div class="w-[150px] h-14 flex items-center">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 60" class="w-full h-full">
                                    <defs>
                                        <linearGradient id="gold-fluid" x1="0%" y1="0%" x2="100%" y2="100%">
                                            <stop offset="0%" stop-color="#ffe596"/>
                                            <stop offset="50%" stop-color="#cfa153"/>
                                            <stop offset="100%" stop-color="#684a16"/>
                                        </linearGradient>
                                    </defs>
                                    <path d="M20,15 C20,8 25,6 25,6 M25,6 L25,38 C25,48 16,50 13,44 M35,6 C40,6 44,22 47,38 C52,55 62,2 72,2" fill="none" stroke="url(#gold-fluid)" stroke-width="5" stroke-linecap="round"/>
                                    <circle cx="25.5" cy="-2" r="3.5" fill="url(#gold-fluid)"/>
                                    <path d="M2,28 L8,28 L10,20 L12,36 L15,15 L18,40 L21,24 L24,32 L28,28 L62,28 L65,18 L68,38 L71,12 L74,44 L77,24 L80,32 L92,28 L115,28" fill="none" stroke="url(#gold-fluid)" stroke-width="1.2" opacity="0.45"/>
                                </svg>
                            </div>
                        </div>

                        <div class="pill-gold-gradient rounded-full py-6 px-2.5 flex items-center justify-center absolute right-[-10px] top-[-10px] h-[142px]">
                            <span class="text-[#0d0f12] uppercase font-bold text-[8.5px] tracking-[0.18em] whitespace-nowrap vertical-text">
                                Every Person Deserves a Voice
                            </span>
                        </div>
                    </div>

                    <div class="z-10 relative pr-12 space-y-1 mt-1">
                        <h2 class="text-2xl font-bold tracking-wide gold-embossed">John Lazzaro</h2>
                        <p class="text-xs text-[#ebd197]/80 font-medium tracking-wide">jVox AAC</p>
                        <p class="text-xs text-gray-400 font-mono tracking-wide">hello@jvox.org</p>
                    </div>

                    <div class="space-y-2 pr-12 z-10 relative">
                        <div class="bg-[#0b0c10]/90 border border-[#242936] rounded-lg px-3 py-1.5 flex items-center font-mono text-[9.5px]">
                            <span class="text-[#cfa153] uppercase text-[8px] tracking-wider font-sans font-bold mr-2 whitespace-nowrap">🔑 Key:</span>
                            <span id="cardKey" class="text-gray-400 truncate max-w-[240px]">CLICK TO PASTE GROQ API KEY FOR TESTER</span>
                        </div>

                        <div class="flex items-center justify-between text-[9px] font-semibold text-gray-400 tracking-wide">
                            <div class="flex items-center gap-1">
                                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                                <span class="text-gray-400">SECURITY BETA BUILD</span>
                            </div>
                            <div id="cardExpires" class="text-[#fce095] uppercase font-mono bg-[#1c1613] border border-[#cfa153]/30 px-2.5 py-0.5 rounded">
                                EXPIRES: MM/DD/YYYY
                            </div>
                        </div>
                    </div>

                </div>
            </div>
            
        </div>

    </div>

    <script>
        const inputKey = document.getElementById('inputKey');
        const inputExpires = document.getElementById('inputExpires');
        const cardKey = document.getElementById('cardKey');
        const cardExpires = document.getElementById('cardExpires');
        const btnDownload = document.getElementById('btnDownload');

        // Dynamic Text updates
        inputKey.addEventListener('input', (e) => {
            if (e.target.value.trim() !== "") {
                cardKey.innerText = e.target.value;
                cardKey.classList.remove('text-gray-400');
                cardKey.classList.add('text-white');
            } else {
                cardKey.innerText = "CLICK TO PASTE GROQ API KEY FOR TESTER";
                cardKey.classList.add('text-gray-400');
                cardKey.classList.remove('text-white');
            }
        });

        inputExpires.addEventListener('input', (e) => {
            if (e.target.value) {
                const dateObj = new Date(e.target.value + 'T00:00:00');
                const formattedDate = dateObj.toLocaleDateString('en-US', {
                    month: '2-digit',
                    day: '2-digit',
                    year: 'numeric'
                });
                cardExpires.innerText = `EXPIRES: ${formattedDate}`;
            } else {
                cardExpires.innerText = 'EXPIRES: MM/DD/YYYY';
            }
        });

        // High-Density Exporter Engine Loop
        btnDownload.addEventListener('click', () => {
            const containerFrame = document.getElementById('captureFrame');
            
            // Set explicit high density canvas configurations to eliminate text compression anomalies
            html2canvas(containerFrame, {
                scale: 3,                 // 3x upscaling to handle pristine font profiles on mobile texts
                useCORS: true,            // Avoids taint flags
                backgroundColor: null,    // Maintains transparent rounded wrapper bounds
                logging: false
            }).then(canvas => {
                const imageUri = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.href = imageUri;
                link.download = `jvox-tester-card.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }).catch(err => alert("Rendering Engine Delay: please double check script asset permissions."));
        });
    </script>
</body>
</html>
